<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Authorization - App Stream</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; background: #0f172a; color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: rgba(15, 23, 42, .8); border: 1px solid rgba(148, 163, 184, .2); border-radius: 1rem; padding: 2rem; max-width: 600px; width: 90%; text-align: center; }
    h1 { color: #60a5fa; }
    pre { background: #1e293b; padding: 1rem; border-radius: .5rem; word-break: break-all; text-align: left; color: #e2e8f0; }
    .error { color: #f87171; }
    .success { color: #4ade80; }
  </style>
</head>
<body>
  <div class="card">
    <h1>TikTok Authorization</h1>
    <p id="status"></p>
    <pre id="code"></pre>
    <p class="error" id="error"></p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const errorDescription = params.get('error_description');
    const statusEl = document.getElementById('status');
    const codeEl = document.getElementById('code');
    const errorEl = document.getElementById('error');

    if (error) {
      statusEl.textContent = 'Authorization failed';
      errorEl.textContent = (errorDescription ? errorDescription : error);
    } else if (code) {
      statusEl.innerHTML = '<span class="success">Authorization successful</span>';
      codeEl.textContent = 'Authorization code: ' + code;
      if (state) {
        codeEl.textContent += 'State: ' + state;
      }
    } else {
      statusEl.textContent = 'No authorization code found in the URL.';
    }
  </script>
</body>
</html>
